version: "3.9"

services:
  backend:
    build: ./backend
    container_name: dbpilot_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backup_uploads:/app/uploads
    depends_on:
      postgres_meta:
        condition: service_healthy
      redis:
        condition: service_healthy


  celery_worker:
    build: ./backend
    container_name: dbpilot_celery
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - ./backend:/app
      - ./backup_uploads:/app/uploads
    depends_on:
      - redis
      - backend
    

  celery_beat:
    build: ./backend
    container_name: dbpilot_beat
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    

  frontend:
    build: ./frontend
    container_name: dbpilot_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
 

  postgres_meta:
    image: postgres:15-alpine
    container_name: dbpilot_meta_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${META_DB_USER:-dbpilot}
      POSTGRES_PASSWORD: ${META_DB_PASSWORD:-dbpilot_secret}
      POSTGRES_DB: ${META_DB_NAME:-dbpilot_meta}
    volumes:
      - ./meta_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${META_DB_USER:-dbpilot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    

  redis:
    image: redis:7-alpine
    container_name: dbpilot_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  

   



